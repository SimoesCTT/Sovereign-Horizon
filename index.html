<!DOCTYPE html>
<html>
<head>
    <title>Sovereign-Horizon | Manifold Observer</title>
    <style>
        body { margin: 0; background: #000; color: #00ffcc; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.8); padding: 20px; border: 1px solid #00ffcc; box-shadow: 0 0 15px #00ffcc; }
        #telemetry { position: absolute; bottom: 20px; right: 20px; text-align: right; background: rgba(0,0,0,0.8); padding: 10px; border-right: 3px solid #00ffcc; }
        .glitch { animation: pulse 2s infinite; font-weight: bold; letter-spacing: 2px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .stat-val { color: #fff; text-shadow: 0 0 5px #00ffcc; }
    </style>
</head>
<body>
    <div id="ui">
        <h1 class="glitch">SOVEREIGN-HORIZON v1.0.0</h1>
        <div id="status">STATUS: INITIALIZING...</div>
        <div>FIDELITY: <span class="stat-val" id="fid-val">1.0000000000000000</span></div>
        <div>RESONANCE: <span class="stat-val">λ=0.96314159</span></div>
    </div>

    <div id="telemetry">
        <div>CONFLICTS DETECTED</div>
        <div id="conf-count" style="font-size: 2em;" class="stat-val">0</div>
        <div style="font-size: 0.8em; margin-top: 10px;">SINGAPORE ZENITH BASELINE</div>
    </div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(30, 30, 0x004444, 0x001111);
        grid.position.y = -8;
        scene.add(grid);

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(1024 * 3);
        const material = new THREE.PointsMaterial({ color: 0x00ffcc, size: 0.08, transparent: true, opacity: 0.8 });
        const points = new THREE.Points(geometry, material);
        scene.add(points);
        camera.position.z = 18;
        camera.position.y = 2;

        const socket = new WebSocket('ws://localhost:8000/ws/manifold');

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const bits = data.bits;
            
            // Update the UI Telemetry
            if(data.conflicts) {
                document.getElementById('conf-count').innerText = data.conflicts;
            }

            for(let i = 0; i < 1024; i++) {
                let phi = Math.acos(-1 + (2 * i) / 1024);
                let theta = Math.sqrt(1024 * Math.PI) * phi;
                let radius = bits[i] ? 7 : 6.8; 
                
                positions[i*3] = radius * Math.cos(theta) * Math.sin(phi);
                positions[i*3+1] = radius * Math.sin(theta) * Math.sin(phi);
                positions[i*3+2] = radius * Math.cos(phi);
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.attributes.position.needsUpdate = true;
            document.getElementById('status').innerText = "STATUS: MONITORING MANIFOLD";
        };

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.y += 0.001;
            points.rotation.x += 0.0005;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
